name: flutter_startup_kit
description: "A production-ready, enterprise-grade Flutter application with Clean Architecture, Bloc state management, and comprehensive built-in modules."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  
  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0
  
  # Routing
  go_router: ^14.8.1
  
  # Network
  dio: ^5.7.0
  
  # Localization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Environment
  flutter_dotenv: ^5.2.1
  
  # WebSocket
  web_socket_channel: ^3.0.2
  
  # UI
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  
  # Connectivity
  connectivity_plus: ^6.1.2
  
  # Logging
  logger: ^2.5.0
  
  # Utils
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  collection: ^1.19.1
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.2
  firebase_crashlytics: ^4.3.2
  firebase_messaging: ^15.2.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Device Info
  device_info_plus: ^11.3.3
  
  # Package Info
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  
  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env.dev
    - .env.staging
    - .env.prod
    - assets/images/
    - assets/fonts/
    - assets/lottie/
